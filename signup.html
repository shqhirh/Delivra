<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivra Sign Up</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 0;
background:linear-gradient(135deg,#0f2027,#5396AC,#0f2027);
}

.container{
width:1000px;
display:flex;
border-radius:25px;
overflow:hidden;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

.left-panel{
width:50%;
position:relative;
background:url("images/bg.jpg") center/cover no-repeat;
min-height:650px;
}

.left-panel::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

.overlay-content{
position:absolute;
z-index:2;
color:white;
padding:30px;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.user{
display:flex;
align-items:center;
gap:12px;
}

.user img{
width:50px;
height:50px;
border-radius:50%;
}

.right-panel{
width:50%;
background:#f5f5f7;
padding:50px;
position:relative;
}

.logo{
position:absolute;
top:30px;
right:40px;
font-weight:bold;
letter-spacing:2px;
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ddd;
outline:none;
font-size:14px;
}

input:focus{
border-color:#e6352b;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:25px;
background:#e6352b;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

.btn:hover{
background:#094CC8;
}

.message{
display:none;
margin-top:15px;
padding:12px;
border-radius:10px;
background:#e8f5e9;
color:#2e7d32;
font-size:14px;
}

.otp-section{
display:none;
margin-top:15px;
}

.login-link{
text-align:center;
margin-top:20px;
font-size:14px;
}

.login-link span{
color:#e6352b;
font-weight:600;
cursor:pointer;
}

.whatsapp-box{
display:none;
margin-top:15px;
padding:12px;
background:#DCF8C6;
border-radius:12px;
font-size:14px;
line-height:1.6;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  body {
    padding: 20px;
    align-items: flex-start;
  }

  .container {
    width: 100%;
    flex-direction: column;
    border-radius: 20px;
  }

  .left-panel {
    width: 100%;
    min-height: 160px;
  }

  .right-panel {
    width: 100%;
    padding: 40px 28px 36px;
  }

  .logo {
    top: 20px;
    right: 28px;
  }

  h1 {
    font-size: 26px;
  }
}

@media (max-width: 480px) {
  body {
    padding: 0;
  }

  .container {
    border-radius: 0;
    box-shadow: none;
    min-height: 100vh;
  }

  .left-panel {
    min-height: 130px;
  }

  .right-panel {
    padding: 32px 20px 30px;
  }

  h1 {
    font-size: 22px;
  }

  input {
    padding: 12px;
  }

  .btn {
    padding: 13px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="left-panel">

<div class="overlay-content">

<h3>DELIVRA WORKSPACE</h3>

<div class="user">
<img src="images/logo.jpg" alt="">
<div>
<h4>Delivra Team</h4>
<p>Package Tracking System</p>
</div>
</div>

</div>

</div>

<div class="right-panel">

<div class="logo">DELIVRA</div>

<h1>Create Account</h1>
<p class="subtitle">Register and verify your account via WhatsApp OTP</p>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="text" id="phone" placeholder="WhatsApp Number">

<button class="btn" onclick="sendOTP()">
Send OTP
</button>

<div class="whatsapp-box" id="whatsappBox">
📱 WhatsApp Message<br><br>
Your Delivra verification code is:<br>
<b>123456</b>
</div>

<div class="otp-section" id="otpSection">

<input type="text" id="otp" placeholder="Enter OTP">

<button class="btn" onclick="verifyOTP()">
Verify & Create Account
</button>

</div>

<div class="message" id="successMessage">
Account successfully created!
</div>

<div class="login-link">
Already have an account?
<span onclick="window.location.href='index.html'">
Login
</span>
</div>

</div>

</div>

<script>

const generatedOTP = "123456";

function sendOTP(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let phone = document.getElementById("phone").value;

if(name === "" || email === "" || phone === ""){

alert("Please fill in all fields.");

return;

}

document.getElementById("whatsappBox").style.display = "block";
document.getElementById("otpSection").style.display = "block";

alert("OTP sent successfully to WhatsApp number.");

}

function verifyOTP(){

let enteredOTP = document.getElementById("otp").value;

if(enteredOTP === generatedOTP){

document.getElementById("successMessage").style.display = "block";

setTimeout(function(){
    window.location.href = "index.html";
},1500);

}else{

alert("Invalid OTP. Please try again.");

}

}

</script>

</body>
</html>
