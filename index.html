<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivra Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  overflow-y: auto;
  padding: 40px 0;

  background: linear-gradient(135deg, #0f2027, #5396AC, #0f2027);
}

.container {
  width: 1050px;
  height: 520px;
  display: flex;
  border-radius: 25px;
  overflow: hidden;

  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(25px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

.left-panel {
  width: 50%;
  position: relative;
  background: url("images/bg.jpg") center/cover no-repeat;
}

.left-panel::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

.overlay-content {
  position: absolute;
  z-index: 2;
  color: white;
  padding: 30px;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.overlay-content h3 {
  font-weight: 500;
}

.user {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
}

.user h4 {
  font-size: 16px;
}

.user p {
  font-size: 12px;
  color: #ccc;
}

.right-panel {
  width: 50%;
  background: #f5f5f7;
  padding: 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-radius: 25px;
  position: relative;
}

.logo {
  position: absolute;
  top: 30px;
  right: 50px;
  font-weight: bold;
  letter-spacing: 2px;
}

.right-panel h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

.right-panel > p {
  color: #777;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #ff3b30;
}

/* PASSWORD WRAPPER */
.password-wrapper {
  position: relative;
}

/* EYE ICON */
.eye-icon {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 18px;
  color: #888;
}

/* ERROR MESSAGE */
.error-msg {
  color: #ff3b30;
  font-size: 13px;
  margin-top: 5px;
  display: none;
}

.forgot {
  text-align: right;
  font-size: 13px;
  color: #ff3b30;
  margin-top: -5px;
  cursor: pointer;
}

.login-btn {
  margin-top: 25px;
  padding: 14px;
  border: none;
  border-radius: 25px;
  background: #e6352b;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.login-btn:hover {
  background: #094CC8;
}

.signup {
  margin-top: 20px;
  font-size: 14px;
  text-align: center;
}

.signup span {
  color: #ff3b30;
  cursor: pointer;
  font-weight: 500;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  body {
    padding: 20px;
    align-items: flex-start;
  }

  .container {
    width: 100%;
    height: auto;
    flex-direction: column;
    border-radius: 20px;
  }

  .left-panel {
    width: 100%;
    min-height: 160px;
    border-radius: 0;
  }

  .right-panel {
    width: 100%;
    padding: 40px 28px 36px;
    border-radius: 0 0 20px 20px;
  }

  .logo {
    top: 20px;
    right: 28px;
  }

  .right-panel h1 {
    font-size: 26px;
  }
}

@media (max-width: 480px) {
  body {
    padding: 0;
  }

  .container {
    border-radius: 0;
    box-shadow: none;
    min-height: 100vh;
  }

  .left-panel {
    min-height: 130px;
  }

  .right-panel {
    padding: 32px 20px 30px;
    border-radius: 0;
  }

  .right-panel h1 {
    font-size: 22px;
  }

  input {
    padding: 12px;
  }

  .login-btn {
    padding: 13px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left-panel">
    <div class="overlay-content">
      <h3>DELIVRA WORKSPACE</h3>
      <div class="user">
        <img src="images/logo.jpg" alt="Delivra Logo">
        <div>
          <h4>Delivra Team</h4>
          <p>Package Tracking System</p>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">

    <div class="logo">DELIVRA</div>

    <h1>Welcome Back</h1>
    <p>Track your deliveries smarter & faster</p>

    <input type="email" id="emailInput" placeholder="Email">

    <!-- PASSWORD WITH EYE ICON -->
    <div class="password-wrapper">
      <input type="password" id="passwordInput" placeholder="Password">
      <span class="eye-icon" onclick="togglePassword()"><i class="ti ti-eye"></i></span>
    </div>

    <div class="error-msg" id="errorMsg">Invalid email or password. Please try again.</div>

    <div class="forgot" onclick="forgotPassword()">Forgot password?</div>

    <button class="login-btn" onclick="login()">Login</button>

    <div class="signup">
      Don't have an account? <span onclick="signup()">Sign up</span>
    </div>

  </div>

</div>

<script>
const VALID_EMAIL = "admin@delivra.com";
const VALID_PASSWORD = "admin123";

function login() {
  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value.trim();
  const errorMsg = document.getElementById("errorMsg");

  if (email === "" || password === "") {
    errorMsg.textContent = "Please enter your email and password!";
    errorMsg.style.display = "block";
    return;
  }

  if (email === VALID_EMAIL && password === VALID_PASSWORD) {
    errorMsg.style.display = "none";
    alert("Login Successful!");
    window.location.href = "dashboard.html";
  } else {
    errorMsg.textContent = "Invalid email or password. Please try again.";
    errorMsg.style.display = "block";
  }
}

function togglePassword() {
  const passwordInput = document.getElementById("passwordInput");
  const eye = document.querySelector(".eye-icon");

  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    eye.innerHTML = "<i class=\"ti ti-eye-off\"></i>"; // change icon
  } else {
    passwordInput.type = "password";
    eye.innerHTML = "<i class=\"ti ti-eye\"></i>";
  }
}

function signup() {
  window.location.href = "signup.html";
}

function forgotPassword() {
  window.location.href = "forgotpassword.html";
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") login();
});
</script>

</body>
</html>
